name: CI-CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
      
      - run: yarn install --frozen-lockfile
      
      - name: Run tests
        run: yarn test

  build:
    name: Build
    runs-on: ubuntu-latest

    needs: [test]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
      
      - run: yarn install --frozen-lockfile

      - name: Build app
        run: yarn build

  image:
    name: Push image
    runs-on: ubuntu-latest

    needs: [test, build]

    steps:
      - uses: actions/checkout@v4

      - name: Logit to Dockerhub
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_NAME }}" --password-stdin

      - name: Push image
        run: |
          docker build -t "${{ secrets.DOCKERHUB_NAME }}/myapp:${{ github.sha }}" .
          docker push "${{ secrets.DOCKERHUB_NAME }}/myapp:${{ github.sha }}"
    
  change-image:
    name: Change image
    runs-on: ubuntu-latest

    needs: [test, build, image]

    steps:
      - uses: actions/checkout@v4

      - name: Checkout infra repo
        uses: actions/checkout@v4
        with:
          repository: fedorss23/nest-infra
          token: ${{ secrets.GH_PAT }}
          path: infra

      - name: Update deployment image
        run: |
          cd infra
          sed -i "s|image: .*myapp:.*|image: ${{ secrets.DOCKERHUB_NAME }}/myapp:${{ github.sha }}|" apps/myapp/deployment.yaml

      - name: Commit infra update
        run: |
          cd infra
          git config user.name "fedorss23"
          git config user.email "lesssa886@gmail.com"

          git add .
          git commit -m "update image to ${{ github.sha }}"
          git push

