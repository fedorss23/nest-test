name: CI-CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
      
      - run: yarn install --frozen-lockfile
      
      - name: Run tests
        run: yarn test

  build:
    name: Build
    runs-on: ubuntu-latest

    needs: [test]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
      
      - run: yarn install --frozen-lockfile

      - name: Build app
        run: yarn build
    
  provisions:
    name: Install deps and inc
    runs-on: ubuntu-latest

    needs: [test, build]

    steps:
      - uses: actions/checkout@v4

      - name: Setup bootstrap key
        run: |
          mkdir -p ~/.ssh
          echo "${{ BOOTSTRAP_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
      
      - name: Run ansible
        env: 
          DEPLOY_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
        run: |
          ansible-playbook -i ansible/inventory.ini ansible/site.yml

  deploy:
    runs-on: ubuntu-latest
    needs: [test, build, provisions]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy with ssh
        uses: appleboy/ssh-action@v1.0.2
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            rm -rf project
            mkdir project
            cd project

            minikube start

            minikube addons enable ingress

            git init
            git clone https://github.com/fedorss23/nest-test.git
            cd nest-test

            docker build -t myapp:latest .
            minikube image load myapp:latest

            cd k8s
            kubectl apply -f namespace.yml
            kubectl apply -f backend/deployment.yml
            kubectl apply -f backend/service.yml
            kubectl apply -f ingress/ingress.yml

      
